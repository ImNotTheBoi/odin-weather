<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <section class="searchSection">
      <header>Odin Weather <img src="./svg/cloud.svg" alt="cloud" /></header>
      <input type="text" class="location" />
    </section>
    <section class="mainContent">
      <div class="weatherHeader">
        <div class="temperature">40 C</div>
        <div class="time">17:00</div>
      </div>
      <div class="cityHeader">
        <div class="city">Pasig</div>
        <div class="description">Partially Cloudly Throughout the Day</div>
      </div>
    </section>
    <section class="sideContent">
      <div class="calendar">
        <div class="today">Today</div>
        <div class="todayCondition">Cloudly</div>
        <div class="tomorrow">Tomorrow</div>
        <div class="tomorrowCondition">Cloudly</div>
        <div class="overmorrow">Overmorrow</div>
        <div class="overmorrowCondition">Cloudly</div>
      </div>
      <div class="exit">
        <button class="back"><img src="./svg/exit.svg" alt="exit" /></button>
      </div>
    </section>
  </body>
</html>
